name: Question
description: Ask for help using, building, or understanding OpenStudy.
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Questions are welcome.

        欢迎提问。请尽量附上你已经尝试过的内容，这样更容易得到有效回答。
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - App usage
        - AI provider setup
        - Document import
        - Packaging / release
        - Local development
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What do you want to know?
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Include docs, commands, screenshots, or logs if useful.
