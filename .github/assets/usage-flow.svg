<svg width="1280" height="780" viewBox="0 0 1280 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="112" y1="80" x2="1188" y2="716" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="0.5" stop-color="#F2FBF5"/>
      <stop offset="1" stop-color="#FFF9F0"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="258" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="258" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="258" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="258" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="258" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="780" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="44" y="44" width="1192" height="692" rx="36" fill="url(#bg)"/>
  <rect x="44" y="44" width="1192" height="692" rx="36" stroke="#D8E4F2"/>

  <text x="92" y="112" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">OPENSTUDY WORKFLOW</text>
  <text x="92" y="156" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700">From raw material to a repeatable study loop</text>
  <text x="92" y="196" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="19">
    Import scattered documents, structure them into questions, practise with AI support, and review the exact places where understanding still leaks.
  </text>

  <g filter="url(#shadow)">
    <rect x="90" y="268" width="214" height="176" rx="28" fill="url(#navy)"/>
    <text x="120" y="326" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">STEP 1</text>
    <text x="120" y="364" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Import</text>
    <text x="120" y="396" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="16">PDF, Markdown, DOCX,</text>
    <text x="120" y="420" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="16">PPTX, or text notes</text>
    <circle cx="256" cy="326" r="22" fill="#FFFFFF" fill-opacity="0.14"/>
    <path d="M256 312V340M242 326H270" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="326" y="268" width="214" height="176" rx="28" fill="url(#blue)"/>
    <text x="356" y="326" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">STEP 2</text>
    <text x="356" y="364" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Structure</text>
    <text x="356" y="396" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="16">AI extracts questions,</text>
    <text x="356" y="420" fill="#E0F2FE" font-family="Arial, Helvetica, sans-serif" font-size="16">answers, and explanations</text>
    <circle cx="492" cy="326" r="22" fill="#FFFFFF" fill-opacity="0.16"/>
    <path d="M480 334L490 320L504 334" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="562" y="268" width="214" height="176" rx="28" fill="url(#green)"/>
    <text x="592" y="326" fill="#DCFCE7" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">STEP 3</text>
    <text x="592" y="364" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Practice</text>
    <text x="592" y="396" fill="#ECFDF5" font-family="Arial, Helvetica, sans-serif" font-size="16">Answer with shortcuts,</text>
    <text x="592" y="420" fill="#ECFDF5" font-family="Arial, Helvetica, sans-serif" font-size="16">retry wrong questions later</text>
    <circle cx="728" cy="326" r="22" fill="#FFFFFF" fill-opacity="0.16"/>
    <path d="M716 328L724 336L740 320" stroke="#FFFFFF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="798" y="268" width="214" height="176" rx="28" fill="url(#amber)"/>
    <text x="828" y="326" fill="#FEF3C7" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">STEP 4</text>
    <text x="828" y="364" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Ask AI</text>
    <text x="828" y="396" fill="#FFF7ED" font-family="Arial, Helvetica, sans-serif" font-size="16">Get hints, explanations,</text>
    <text x="828" y="420" fill="#FFF7ED" font-family="Arial, Helvetica, sans-serif" font-size="16">and reasoning in context</text>
    <circle cx="964" cy="326" r="22" fill="#FFFFFF" fill-opacity="0.18"/>
    <path d="M952 322C952 317.582 955.582 314 960 314H969.5C973.09 314 976 316.91 976 320.5V330C976 333.59 973.09 336.5 969.5 336.5H963L956 342V336.5H960C955.582 336.5 952 332.918 952 328.5V322Z" stroke="#FFFFFF" stroke-width="3"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1034" y="268" width="150" height="176" rx="28" fill="url(#violet)"/>
    <text x="1062" y="326" fill="#EDE9FE" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">STEP 5</text>
    <text x="1062" y="364" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Review</text>
    <text x="1062" y="396" fill="#F5F3FF" font-family="Arial, Helvetica, sans-serif" font-size="16">Wrong-book</text>
    <text x="1062" y="420" fill="#F5F3FF" font-family="Arial, Helvetica, sans-serif" font-size="16">and insights</text>
    <circle cx="1142" cy="326" r="22" fill="#FFFFFF" fill-opacity="0.18"/>
    <path d="M1134 337C1137.2 334.2 1146.8 334.2 1150 337M1142 320.5C1144.49 320.5 1146.5 322.515 1146.5 325C1146.5 327.485 1144.49 329.5 1142 329.5C1139.52 329.5 1137.5 327.485 1137.5 325C1137.5 322.515 1139.52 320.5 1142 320.5Z" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  </g>

  <path d="M304 356H326" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M540 356H562" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M776 356H798" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M1012 356H1034" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="92" y="500" width="1092" height="176" rx="30" fill="#FFFFFF" fill-opacity="0.78"/>
    <rect x="92" y="500" width="1092" height="176" rx="30" stroke="#E2E8F0"/>
    <text x="126" y="554" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">What makes the loop stick</text>
    <text x="126" y="594" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">1. The source stays editable instead of becoming a black box.</text>
    <text x="126" y="626" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">2. Practice is keyboard-friendly, fast to retry, and connected to wrong-answer review.</text>
    <text x="126" y="658" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="17">3. AI is used where it helps most: structuring material, explaining confusion, and suggesting next actions.</text>
  </g>
</svg>
